services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: financial-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_SA_PASSWORD}"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"${DB_SA_PASSWORD}\" -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    container_name: financial-web
    build:
      context: .
      dockerfile: FinancialProductLikelist.Web/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=${DB_NAME};User Id=sa;Password=${DB_SA_PASSWORD};TrustServerCertificate=True;Encrypt=False;MultipleActiveResultSets=True"
    depends_on:
      sqlserver:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully

  nginx:
    image: nginx:1.27-alpine
    container_name: financial-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

  db-init:
    image: mcr.microsoft.com/mssql-tools
    container_name: financial-db-init
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./FinancialProductLikelist.Web/DB:/scripts:ro
    command: >
      /bin/bash -c "
      /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P '${DB_SA_PASSWORD}' -Q \"IF DB_ID(N'${DB_NAME}') IS NULL CREATE DATABASE [${DB_NAME}];\" &&
      /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P '${DB_SA_PASSWORD}' -d ${DB_NAME} -i /scripts/DDL.sql &&
      /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P '${DB_SA_PASSWORD}' -d ${DB_NAME} -i /scripts/StoredProcedures.sql &&
      /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P '${DB_SA_PASSWORD}' -d ${DB_NAME} -i /scripts/DML.sql
      "

volumes:
  sqlserver_data:
