services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: financial-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "__CHANGE_ME__"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"__CHANGE_ME__\" -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    container_name: financial-web
    build:
      context: .
      dockerfile: FinancialProductLikelist.Web/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=FinancialProductLikeListDb;User Id=sa;Password=__CHANGE_ME__;TrustServerCertificate=True;Encrypt=False;MultipleActiveResultSets=True"
    depends_on:
      sqlserver:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully

  nginx:
    image: nginx:1.27-alpine
    container_name: financial-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

  db-init:
    image: mcr.microsoft.com/mssql-tools
    container_name: financial-db-init
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./DB:/scripts:ro
    command: >
      /bin/bash -c "
      /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P '__CHANGE_ME__' -Q \"IF DB_ID(N'FinancialProductLikeListDb') IS NULL CREATE DATABASE [FinancialProductLikeListDb];\" &&
      /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P '__CHANGE_ME__' -d FinancialProductLikeListDb -i /scripts/DDL.sql &&
      /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P '__CHANGE_ME__' -d FinancialProductLikeListDb -i /scripts/StoredProcedures.sql &&
      /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P '__CHANGE_ME__' -d FinancialProductLikeListDb -i /scripts/DML.sql
      "

volumes:
  sqlserver_data:

